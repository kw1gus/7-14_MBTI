<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏫 학교생활 MBTI 진로 테스트 🔮</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF9F0;
    --paper:#FFFDF8;
    --pink:#FFB8D9;
    --pink-soft:#FFE4F1;
    --sky:#A8D8FF;
    --sky-soft:#E3F2FF;
    --mint:#BEF2D9;
    --mint-soft:#E6FBF0;
    --lavender:#DDD3FF;
    --lavender-soft:#F1ECFF;
    --gold:#FFD166;
    --ink:#4A4458;
    --ink-light:#8A8299;
    --shadow: 4px 6px 0 rgba(74,68,88,0.12);
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 10% 15%, var(--pink-soft) 0, transparent 40%),
      radial-gradient(circle at 90% 10%, var(--sky-soft) 0, transparent 40%),
      radial-gradient(circle at 85% 90%, var(--mint-soft) 0, transparent 40%),
      radial-gradient(circle at 15% 85%, var(--lavender-soft) 0, transparent 40%),
      var(--cream);
    font-family:'Gowun Dodum', sans-serif;
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    overflow-x:hidden;
  }

  .float-deco{
    position:fixed;
    font-size:28px;
    opacity:0.55;
    animation: floaty 6s ease-in-out infinite;
    pointer-events:none;
    z-index:0;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.05));
  }
  @keyframes floaty{
    0%,100%{transform:translateY(0) rotate(-6deg);}
    50%{transform:translateY(-18px) rotate(8deg);}
  }

  .stage{
    position:relative;
    width:100%;
    max-width:560px;
    z-index:1;
  }

  .card{
    background:var(--paper);
    border-radius:28px;
    padding:36px 30px;
    box-shadow: var(--shadow);
    border:3px solid var(--ink);
    position:relative;
    animation: pop-in 0.45s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes pop-in{
    from{opacity:0; transform:scale(0.92) translateY(14px);}
    to{opacity:1; transform:scale(1) translateY(0);}
  }

  /* washi tape corners */
  .card::before, .card::after{
    content:"";
    position:absolute;
    width:70px;
    height:26px;
    top:-14px;
    background: repeating-linear-gradient(45deg, var(--pink), var(--pink) 6px, var(--pink-soft) 6px, var(--pink-soft) 12px);
    opacity:0.85;
    border-radius:3px;
    box-shadow:0 2px 3px rgba(0,0,0,0.08);
  }
  .card::before{ left:-10px; transform:rotate(-18deg); }
  .card::after{ right:-10px; transform:rotate(18deg);
    background: repeating-linear-gradient(45deg, var(--sky), var(--sky) 6px, var(--sky-soft) 6px, var(--sky-soft) 12px);
  }

  h1{
    font-family:'Jua', sans-serif;
    font-size:1.7rem;
    text-align:center;
    margin:6px 0 8px;
    line-height:1.4;
  }

  .subtitle{
    text-align:center;
    color:var(--ink-light);
    font-size:0.95rem;
    margin-bottom:22px;
  }

  /* ---------- 시작 화면 ---------- */
  .start-emoji{
    text-align:center;
    font-size:3.4rem;
    margin-bottom:6px;
    animation: wiggle 2.4s ease-in-out infinite;
  }
  @keyframes wiggle{
    0%,100%{transform:rotate(0deg);}
    25%{transform:rotate(-8deg);}
    75%{transform:rotate(8deg);}
  }

  .info-box{
    background:var(--lavender-soft);
    border:2px dashed var(--lavender);
    border-radius:18px;
    padding:14px 18px;
    font-size:0.9rem;
    margin:18px 0;
    text-align:center;
  }

  button{
    font-family:'Jua', sans-serif;
    cursor:pointer;
    border:none;
    outline:none;
  }

  .btn-main{
    display:block;
    width:100%;
    padding:16px;
    font-size:1.15rem;
    background:var(--pink);
    color:var(--ink);
    border:3px solid var(--ink);
    border-radius:18px;
    box-shadow:3px 4px 0 var(--ink);
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .btn-main:hover{ transform:translate(-2px,-2px); box-shadow:5px 6px 0 var(--ink); }
  .btn-main:active{ transform:translate(1px,1px); box-shadow:1px 2px 0 var(--ink); }

  /* ---------- 진행바 (스티커 도장) ---------- */
  .progress-wrap{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:22px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .stamp{
    width:22px; height:22px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:12px;
    background:var(--cream);
    border:2px solid var(--ink-light);
    opacity:0.5;
    transition: all 0.25s ease;
  }
  .stamp.done{
    background:var(--gold);
    border-color:var(--ink);
    opacity:1;
    transform:scale(1.12);
  }

  .q-count{
    text-align:center;
    font-size:0.85rem;
    color:var(--ink-light);
    margin-bottom:4px;
  }

  .q-text{
    font-family:'Jua', sans-serif;
    font-size:1.25rem;
    text-align:center;
    margin:10px 0 24px;
    line-height:1.5;
  }

  .options{
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .opt-btn{
    display:flex;
    align-items:center;
    gap:12px;
    background:var(--paper);
    border:2.5px solid var(--ink);
    border-radius:16px;
    padding:14px 16px;
    font-family:'Gowun Dodum', sans-serif;
    font-size:1rem;
    text-align:left;
    color:var(--ink);
    box-shadow:3px 3px 0 rgba(74,68,88,0.18);
    transition: all 0.15s ease;
  }
  .opt-btn .opt-emoji{ font-size:1.4rem; flex-shrink:0; }
  .opt-btn:hover{
    background:var(--pink-soft);
    transform:translate(-2px,-2px);
    box-shadow:5px 5px 0 rgba(74,68,88,0.25);
  }
  .opt-btn:active{ transform:translate(1px,1px); box-shadow:1px 1px 0 rgba(74,68,88,0.25); }

  /* ---------- 결과 화면 ---------- */
  .stamp-reveal{
    text-align:center;
    position:relative;
    margin:6px 0 18px;
  }
  .stamp-mark{
    display:inline-block;
    font-size:2.2rem;
    color:#fff;
    background:linear-gradient(135deg, #FF7E9D, #FF5C8A);
    border:4px solid var(--ink);
    border-radius:50%;
    width:150px; height:150px;
    line-height:142px;
    font-family:'Jua', sans-serif;
    letter-spacing:1px;
    transform: scale(0) rotate(-25deg);
    animation: stamp-down 0.55s 0.15s cubic-bezier(.2,1.4,.6,1) forwards;
    box-shadow: 0 6px 0 rgba(0,0,0,0.15);
  }
  @keyframes stamp-down{
    0%{ transform:scale(2.4) rotate(-25deg); opacity:0; }
    60%{ transform:scale(0.92) rotate(-8deg); opacity:1; }
    100%{ transform:scale(1) rotate(-10deg); opacity:1; }
  }

  .type-title{
    font-family:'Jua', sans-serif;
    font-size:1.4rem;
    text-align:center;
    margin:14px 0 4px;
  }
  .type-emoji-row{
    text-align:center;
    font-size:1.8rem;
    margin-bottom:10px;
  }
  .type-desc{
    text-align:center;
    font-size:0.98rem;
    line-height:1.7;
    color:var(--ink);
    margin-bottom:20px;
    padding:0 6px;
  }

  .section-label{
    font-family:'Jua', sans-serif;
    font-size:1rem;
    background:var(--mint);
    display:inline-block;
    padding:4px 14px;
    border-radius:20px;
    border:2px solid var(--ink);
    margin:14px 0 10px;
  }

  .chip-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:6px;
  }
  .chip{
    background:var(--sky-soft);
    border:2px solid var(--ink);
    border-radius:14px;
    padding:6px 12px;
    font-size:0.88rem;
  }

  .traits-row{
    display:flex;
    justify-content:space-between;
    gap:8px;
    margin:16px 0 4px;
    font-size:0.8rem;
    text-align:center;
  }
  .trait-bar{ flex:1; }
  .trait-track{
    height:10px;
    background:var(--lavender-soft);
    border-radius:6px;
    border:1.5px solid var(--ink);
    overflow:hidden;
    margin-top:4px;
  }
  .trait-fill{
    height:100%;
    background:var(--pink);
    border-radius:6px 0 0 6px;
    transition: width 0.8s ease;
  }

  .btn-row{
    display:flex;
    gap:10px;
    margin-top:24px;
  }
  .btn-secondary{
    flex:1;
    padding:13px;
    background:var(--sky-soft);
    border:2.5px solid var(--ink);
    border-radius:14px;
    font-size:0.95rem;
    box-shadow:3px 3px 0 var(--ink);
  }
  .btn-secondary:hover{ transform:translate(-1px,-1px); }

  footer.credit{
    text-align:center;
    font-size:0.75rem;
    color:var(--ink-light);
    margin-top:14px;
  }

  @media (max-width:400px){
    .card{ padding:26px 18px; }
    .stamp-mark{ width:120px; height:120px; line-height:112px; font-size:1.7rem; }
  }
</style>
</head>
<body>

/* ---------------- 상태 ---------------- */
let current = 0;
let scores = {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};

const app = document.getElementById('app');

function renderStart(){
  scores = {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  current = 0;
  app.innerHTML = `
    <div class="start-emoji">🏫✨🔮</div>
    <h1>학교생활로 알아보는<br>나만의 MBTI &amp; 진로 테스트</h1>
    <p class="subtitle">교실 속 20가지 순간, 너의 선택은?</p>
    <div class="info-box">
      🧸 문항 수: 20개 &nbsp;|&nbsp; ⏱️ 소요시간: 약 3분<br>
      🎯 결과: MBTI 유형 + 어울리는 진로 추천!
    </div>
    <button class="btn-main" id="startBtn">🚀 테스트 시작하기</button>
    <footer class="credit">💌 편하게, 솔직하게 골라주세요!</footer>
  `;
  document.getElementById('startBtn').onclick = ()=>{ current=0; renderQuestion(); };
}

function renderProgress(){
  let dots = '';
  for(let i=0;i<questions.length;i++){
    dots += `<div class="stamp ${i<current ? 'done':''}">${i<current?'⭐':''}</div>`;
  }
  return `<div class="progress-wrap">${dots}</div>`;
}

function renderQuestion(){
  const q = questions[current];
  app.innerHTML = `
    ${renderProgress()}
    <div class="q-count">Q${current+1} / ${questions.length}</div>
    <div class="q-text">${q.text}</div>
    <div class="options">
      ${q.options.map((opt,i)=>`
        <button class="opt-btn" data-idx="${i}">
          <span class="opt-emoji">${opt.emoji}</span>
          <span>${opt.label}</span>
        </button>
      `).join('')}
    </div>
  `;
  document.querySelectorAll('.opt-btn').forEach(btn=>{
    btn.onclick = ()=>{
      const opt = q.options[parseInt(btn.dataset.idx)];
      for(const key in opt.scores){ scores[key]+=opt.scores[key]; }
      current++;
      if(current < questions.length){ renderQuestion(); }
      else{ renderResult(); }
    };
  });
}

function computeType(){
  const e_i = scores.E >= scores.I ? 'E' : 'I';
  const s_n = scores.S >= scores.N ? 'S' : 'N';
  const t_f = scores.T >= scores.F ? 'T' : 'F';
  const j_p = scores.J >= scores.P ? 'J' : 'P';
  return e_i+s_n+t_f+j_p;
}

function pct(a,b){
  const total = a+b;
  if(total===0) return 50;
  return Math.round((a/total)*100);
}

function renderResult(){
  const type = computeType();
  const r = results[type];
  const eiPct = pct(scores.E, scores.I);
  const snPct = pct(scores.S, scores.N);
  const tfPct = pct(scores.T, scores.F);
  const jpPct = pct(scores.J, scores.P);

  app.innerHTML = `
    <p class="subtitle">🎊 테스트 완료! 도장 쾅- 👇</p>
    <div class="stamp-reveal"><div class="stamp-mark">${type}</div></div>
    <div class="type-emoji-row">${r.emoji}</div>
    <div class="type-title">${r.title}</div>
    <div class="type-desc">${r.desc}</div>

    <div style="text-align:center;">
      <span class="section-label">🧭 어울리는 진로</span>
    </div>
    <div class="chip-row" style="justify-content:center;">
      ${r.careers.map(c=>`<span class="chip">💼 ${c}</span>`).join('')}
    </div>

    <div style="text-align:center;">
      <span class="section-label">📘 추천 관심 과목</span>
    </div>
    <div class="chip-row" style="justify-content:center;">
      ${r.subjects.map(s=>`<span class="chip">📖 ${s}</span>`).join('')}
    </div>

    <div class="traits-row">
      <div class="trait-bar">E ${eiPct}% · ${100-eiPct}% I
        <div class="trait-track"><div class="trait-fill" style="width:${eiPct}%"></div></div>
      </div>
    </div>
    <div class="traits-row">
      <div class="trait-bar">S ${snPct}% · ${100-snPct}% N
        <div class="trait-track"><div class="trait-fill" style="width:${snPct}%"></div></div>
      </div>
    </div>
    <div class="traits-row">
      <div class="trait-bar">T ${tfPct}% · ${100-tfPct}% F
        <div class="trait-track"><div class="trait-fill" style="width:${tfPct}%"></div></div>
      </div>
    </div>
    <div class="traits-row">
      <div class="trait-bar">J ${jpPct}% · ${100-jpPct}% P
        <div class="trait-track"><div class="trait-fill" style="width:${jpPct}%"></div></div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-secondary" id="retryBtn">🔄 다시하기</button>
      <button class="btn-secondary" id="shareBtn">📋 결과 복사하기</button>
    </div>
    <footer class="credit">🏫 학교생활로 알아보는 MBTI 진로 테스트 🔮</footer>
  `;

  document.getElementById('retryBtn').onclick = renderStart;
  document.getElementById('shareBtn').onclick = ()=>{
    const text = `[학교생활 MBTI 진로테스트]\\n나의 유형: ${type} ${r.title} ${r.emoji}\\n추천 진로: ${r.careers.join(', ')}`;
    navigator.clipboard?.writeText(text).then(()=>{
      const btn = document.getElementById('shareBtn');
      const old = btn.innerText;
      btn.innerText = '✅ 복사완료!';
      setTimeout(()=>{ btn.innerText = old; }, 1500);
    }).catch(()=>{ alert(text); });
  };
}

renderStart();
</script>
