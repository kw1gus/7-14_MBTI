<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mbti_career_test.sh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e14;
    --panel:#10161f;
    --panel-alt:#0d1218;
    --border:#232c38;
    --text:#d6dde6;
    --text-dim:#6b7684;
    --accent:#33e6a0;
    --accent-dim:#1c8f65;
    --blue:#5aa9ff;
    --amber:#e6b455;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:var(--bg);
    background-image:
      linear-gradient(var(--panel-alt) 1px, transparent 1px),
      linear-gradient(90deg, var(--panel-alt) 1px, transparent 1px);
    background-size: 28px 28px;
    font-family:'JetBrains Mono', monospace;
    color:var(--text);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  .window{
    width:100%;
    max-width:620px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:8px;
    box-shadow:0 20px 60px rgba(0,0,0,0.55);
    overflow:hidden;
  }

  .titlebar{
    display:flex;
    align-items:center;
    gap:8px;
    padding:10px 14px;
    background:var(--panel-alt);
    border-bottom:1px solid var(--border);
  }
  .dot{ width:11px; height:11px; border-radius:50%; }
  .dot.r{ background:#ff5f56; }
  .dot.y{ background:#ffbd2e; }
  .dot.g{ background:#27c93f; }
  .titlebar span.fname{
    margin-left:10px;
    font-size:0.78rem;
    color:var(--text-dim);
  }

  .body{
    padding:26px 26px 22px;
  }

  .prompt{
    color:var(--accent);
  }
  .comment{ color:var(--text-dim); }

  h1{
    font-size:1.02rem;
    font-weight:600;
    color:var(--text);
    margin:2px 0 4px;
    line-height:1.6;
  }
  .subtitle{
    color:var(--text-dim);
    font-size:0.82rem;
    margin-bottom:18px;
  }

  .divider{
    border:none;
    border-top:1px dashed var(--border);
    margin:16px 0;
  }

  .info-block{
    background:var(--panel-alt);
    border:1px solid var(--border);
    border-left:3px solid var(--accent-dim);
    padding:12px 14px;
    font-size:0.8rem;
    line-height:1.9;
    color:var(--text);
    margin:16px 0 20px;
  }
  .info-block b{ color:var(--accent); }

  button{
    font-family:'JetBrains Mono', monospace;
    cursor:pointer;
  }

  .btn{
    width:100%;
    background:transparent;
    border:1px solid var(--accent-dim);
    color:var(--accent);
    padding:12px;
    font-size:0.88rem;
    border-radius:4px;
    transition: all 0.15s ease;
  }
  .btn:hover{ background:rgba(51,230,160,0.08); border-color:var(--accent); }
  .btn:active{ transform:scale(0.99); }

  .btn-row{ display:flex; gap:8px; margin-top:20px; }
  .btn-row .btn{ flex:1; }
  .btn.ghost{ border-color:var(--border); color:var(--text-dim); }
  .btn.ghost:hover{ border-color:var(--text-dim); color:var(--text); }

  .topnav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:14px;
  }
  .back-link{
    background:none;
    border:none;
    color:var(--text-dim);
    font-size:0.78rem;
    padding:4px 0;
  }
  .back-link:hover{ color:var(--accent); }
  .back-link:disabled{ opacity:0.25; cursor:default; }

  .progress-line{
    font-size:0.78rem;
    color:var(--text-dim);
    margin-bottom:2px;
  }
  .bar-track{
    width:100%;
    height:6px;
    background:var(--panel-alt);
    border:1px solid var(--border);
    border-radius:3px;
    overflow:hidden;
    margin-bottom:20px;
  }
  .bar-fill{
    height:100%;
    background:var(--accent-dim);
    transition:width 0.3s ease;
  }

  .q-index{ color:var(--text-dim); font-size:0.78rem; margin-bottom:6px;}
  .q-text{
    font-size:1rem;
    font-weight:600;
    color:var(--text);
    line-height:1.6;
    margin-bottom:20px;
  }
  .q-text .cursor{
    display:inline-block;
    width:8px; height:1.1em;
    background:var(--accent);
    margin-left:2px;
    vertical-align:middle;
    animation: blink 1.1s step-end infinite;
  }
  @keyframes blink{ 50%{ opacity:0; } }

  .options{ display:flex; flex-direction:column; gap:8px; }
  .opt-btn{
    display:flex;
    gap:10px;
    align-items:flex-start;
    text-align:left;
    background:var(--panel-alt);
    border:1px solid var(--border);
    color:var(--text);
    padding:12px 14px;
    font-size:0.86rem;
    line-height:1.5;
    border-radius:4px;
    transition: all 0.12s ease;
  }
  .opt-btn .idx{
    color:var(--accent);
    font-weight:600;
    flex-shrink:0;
  }
  .opt-btn:hover{
    border-color:var(--accent-dim);
    background:rgba(51,230,160,0.05);
    transform:translateX(2px);
  }

  .out-block{
    background:#000;
    border:1px solid var(--border);
    border-radius:4px;
    padding:16px 18px;
    font-size:0.82rem;
    line-height:1.95;
    white-space:pre-wrap;
    color:var(--text);
  }
  .out-block .k{ color:var(--blue); }
  .out-block .v{ color:var(--text); }
  .out-block .hl{ color:var(--accent); font-weight:600; }
  .out-block .rule{ color:var(--text-dim); }

  .trait-row{
    display:grid;
    grid-template-columns:34px 1fr 34px;
    align-items:center;
    gap:8px;
    font-size:0.76rem;
    color:var(--text-dim);
    margin-bottom:8px;
  }
  .trait-track{
    height:6px;
    background:var(--panel-alt);
    border:1px solid var(--border);
    border-radius:3px;
    overflow:hidden;
  }
  .trait-fill{ height:100%; background:var(--accent-dim); }

  footer.credit{
    text-align:center;
    font-size:0.7rem;
    color:var(--text-dim);
    margin-top:18px;
  }

  ::selection{ background:rgba(51,230,160,0.25); }
</style>
</head>
<body>

<div class="window">

  INTP:{ title:"분석형", desc:"현상보다 원리를 추적한다. 결론이 나올 때까지 검증 과정을 반복 실행한다.",
    careers:["물리학자","프로그래머","철학자","연구원"], subjects:["물리","수학","정보"] },
  ESTP:{ title:"실행형", desc:"판단과 행동 사이의 지연이 거의 없다. 상황 변화에 대한 반응 속도가 최우선 지표다.",
    careers:["스포츠에이전트","경찰관","사업가","이벤트기획자"], subjects:["체육","경제","사회"] },
  ESFP:{ title:"표출형", desc:"현재 상황의 에너지를 즉시 외부로 전달한다. 주변 반응이 곧 동력이 된다.",
    careers:["배우","방송인","이벤트 MC","승무원"], subjects:["음악","체육","국어"] },
  ENFP:{ title:"발상형", desc:"복수의 가능성을 동시에 탐색한다. 하나의 경로에 고정되는 것을 비효율로 간주한다.",
    careers:["광고기획자","콘텐츠 크리에이터","마케터","PD"], subjects:["국어","사회","미술"] },
  ENTP:{ title:"논증형", desc:"기존 전제에 대한 반증을 탐색하는 것을 기본 작동 방식으로 삼는다.",
    careers:["변호사","벤처 창업가","정치인","컨설턴트"], subjects:["사회","경제","국어"] },
  ESTJ:{ title:"통솔형", desc:"목표-절차-결과의 구조를 명확히 세우고, 조직 전체를 그 구조에 정렬시킨다.",
    careers:["경영자","판사","군인","프로젝트 매니저"], subjects:["사회","경제","수학"] },
  ESFJ:{ title:"연결형", desc:"관계망의 상태를 지속적으로 모니터링하며, 결속을 유지하는 데 자원을 집중한다.",
    careers:["교사","이벤트 플래너","홍보 전문가","간호사"], subjects:["가정","국어","사회"] },
  ENFJ:{ title:"조율형", desc:"개별 구성원의 잠재 지표를 파악하고, 전체 성과가 극대화되는 방향으로 배치한다.",
    careers:["교사","외교관","HR 전문가","상담사"], subjects:["국어","사회","윤리"] },
  ENTJ:{ title:"지휘형", desc:"목표를 설정하면 자원 배분과 실행 경로를 동시에 확정한다. 지연을 허용하지 않는다.",
    careers:["CEO","경영컨설턴트","변호사","정치인"], subjects:["경제","사회","수학"] },
};

/* ---------------- 상태 ---------------- */
let current = 0;
let scores = {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
let history = []; // 각 문항에서 더해진 scores 기록 (뒤로가기용)

const app = document.getElementById('app');

function renderStart(){
  scores = {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  history = [];
  current = 0;
  app.innerHTML = `
    <div class="q-index"><span class="prompt">$</span> ./mbti_career_test.sh <span class="comment">--init</span></div>
    <h1>학교생활 기반 MBTI 진로 분석</h1>
    <p class="subtitle">교내 20개 상황에 대한 응답 로그를 기반으로 성향 및 진로를 산출한다.</p>
    <hr class="divider">
    <div class="info-block">
      <b>QUESTIONS</b> : 20&nbsp;&nbsp;&nbsp;<b>EST. TIME</b> : 3 min<br>
      <b>OUTPUT</b> : MBTI 유형 판정 + 진로/과목 매칭 결과
    </div>
    <button class="btn" id="startBtn">RUN &gt;&gt;</button>
  `;
  document.getElementById('startBtn').onclick = ()=>{ current=0; renderQuestion(); };
}

function renderProgress(){
  const total = questions.length;
  const pctDone = Math.round((current/total)*100);
  return `
    <div class="progress-line">PROGRESS ${current}/${total} (${pctDone}%)</div>
    <div class="bar-track"><div class="bar-fill" style="width:${pctDone}%"></div></div>
  `;
}

function renderQuestion(){
  const q = questions[current];
  app.innerHTML = `
    <div class="topnav">
      <button class="back-link" id="backBtn" ${current===0?'disabled':''}>&lt; 이전 질문</button>
      <span class="back-link">Q${current+1}/${questions.length}</span>
    </div>
    ${renderProgress()}
    <div class="q-text">${q.text}<span class="cursor"></span></div>
    <div class="options">
      ${q.options.map((opt,i)=>`
        <button class="opt-btn" data-idx="${i}">
          <span class="idx">${i+1}.</span>
          <span>${opt.label}</span>
        </button>
      `).join('')}
    </div>
  `;

  const backBtn = document.getElementById('backBtn');
  if(backBtn && current>0){
    backBtn.onclick = ()=>{
      current--;
      const last = history.pop();
      if(last){
        for(const key in last){ scores[key]-=last[key]; }
      }
      renderQuestion();
    };
  }

  document.querySelectorAll('.opt-btn').forEach(btn=>{
    btn.onclick = ()=>{
      const opt = q.options[parseInt(btn.dataset.idx)];
      for(const key in opt.scores){ scores[key]+=opt.scores[key]; }
      history.push(opt.scores);
      current++;
      if(current < questions.length){ renderQuestion(); }
      else{ renderResult(); }
    };
  });
}

function computeType(){
  const e_i = scores.E >= scores.I ? 'E' : 'I';
  const s_n = scores.S >= scores.N ? 'S' : 'N';
  const t_f = scores.T >= scores.F ? 'T' : 'F';
  const j_p = scores.J >= scores.P ? 'J' : 'P';
  return e_i+s_n+t_f+j_p;
}

function pct(a,b){
  const total = a+b;
  if(total===0) return 50;
  return Math.round((a/total)*100);
}

function traitBar(leftLabel, leftPct, rightLabel){
  return `
    <div class="trait-row">
      <span>${leftLabel} ${leftPct}%</span>
      <div class="trait-track"><div class="trait-fill" style="width:${leftPct}%"></div></div>
      <span style="text-align:right;">${100-leftPct}% ${rightLabel}</span>
    </div>
  `;
}

function renderResult(){
  const type = computeType();
  const r = results[type];
  const eiPct = pct(scores.E, scores.I);
  const snPct = pct(scores.S, scores.N);
  const tfPct = pct(scores.T, scores.F);
  const jpPct = pct(scores.J, scores.P);

  app.innerHTML = `
    <div class="topnav">
      <button class="back-link" id="backBtn">&lt; 마지막 질문으로</button>
      <span class="back-link">RESULT</span>
    </div>
    <div class="q-index"><span class="prompt">$</span> analyze --result <span class="comment"># 20/20 응답 완료</span></div>
    <div class="out-block">
<span class="rule">-------------------------------------------</span>
<span class="k">TYPE</span>    : <span class="hl">${type}</span>  (${r.title})
<span class="k">DESC</span>    : ${r.desc}
<span class="rule">-------------------------------------------</span>
<span class="k">CAREER</span>  : ${r.careers.join(', ')}
<span class="k">SUBJECT</span> : ${r.subjects.join(', ')}
<span class="rule">-------------------------------------------</span>
    </div>

    <div style="margin-top:20px;">
      ${traitBar('E', eiPct, 'I')}
      ${traitBar('S', snPct, 'N')}
      ${traitBar('T', tfPct, 'F')}
      ${traitBar('J', jpPct, 'P')}
    </div>

    <div class="btn-row">
      <button class="btn ghost" id="retryBtn">./restart</button>
      <button class="btn" id="shareBtn">./copy_result</button>
    </div>
    <footer class="credit">mbti_career_test.sh · exit 0</footer>
  `;

  document.getElementById('backBtn').onclick = ()=>{
    current = questions.length - 1;
    const last = history.pop();
    if(last){ for(const key in last){ scores[key]-=last[key]; } }
    renderQuestion();
  };
  document.getElementById('retryBtn').onclick = renderStart;
  document.getElementById('shareBtn').onclick = ()=>{
    const text = `[학교생활 MBTI 진로테스트]\nTYPE: ${type} (${r.title})\nCAREER: ${r.careers.join(', ')}`;
    navigator.clipboard?.writeText(text).then(()=>{
      const btn = document.getElementById('shareBtn');
      const old = btn.innerText;
      btn.innerText = 'copied.';
      setTimeout(()=>{ btn.innerText = old; }, 1500);
    }).catch(()=>{ alert(text); });
  };
}

renderStart();
</script>
</body>
</html>
